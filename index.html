<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>To-Do List App</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main class="main-app">
            <form class="task-form">
                <h1 class="title">To-Do List App</h1>
                <label for="task-input">Task:</label>
                <input type="text" class="task-input" name="task-input" required>
                <button class="btn" id="submit-task" type="submit">Add Task</button>
            </form>
            <div class="filter-buttons">
                <label for="filters">Filters:</label>
                <button class="btn" id="all-filter" data-filter="all">All</button>
                <button class="btn" id="active-filter" data-filter="active">Active</button>
                <button class="btn" id="completed-filter" data-filter="completed">Completed</button>
            </div>
            <span class="task-counter"></span>
            <div class="task-container"></div>
            <div class="clear-completed">
                <button id="clear-btn" class="btn">Clear Completed</button>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
